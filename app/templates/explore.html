<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Users</title>
    <style>
        /* General styles */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            font-size: 36px;
            color: #ffffff;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .search-container input {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .profiles-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 20px;
        }

        .profile-card {
            background-color: #1e1e1e;
            color: #e0e0e0;
            width: 200px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            background-color: #2a2a2a;
        }

        .profile-card a {
            text-decoration: none;
            color: #bb86fc;
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        .profile-card a:hover {
            color: #ffffff;
        }

        .no-users {
            font-size: 20px;
            color: #bbbbbb;
            text-align: center;
        }

        /* Responsive styles */
        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }

            .profiles-container {
                gap: 15px;
            }

            .profile-card {
                width: 150px;
                padding: 10px;
            }

            .profile-card a {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <h1>Explore Users</h1>

    <!-- Search Bar -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search users..." onkeyup="filterProfiles()">
    </div>

    <!-- Profiles Container -->
    <div class="profiles-container" id="profiles-container">
        {% if profiles %}
            {% for profile in profiles %}
                <div class="profile-card" data-username="{{ profile['username'] }}">
                    <a href="{{ url_for('profile', username=profile['username']) }}">
                        {{ profile['username'] }}
                    </a>
                </div>
            {% endfor %}
        {% else %}
            <p class="no-users" id="no-users-message">No users found.</p>
        {% endif %}
    </div>

    <script>
        // JavaScript for Filtering Profiles
        function filterProfiles() {
            const input = document.getElementById('search-input');
            const filter = input.value.toLowerCase();
            const profilesContainer = document.getElementById('profiles-container');
            const profileCards = profilesContainer.getElementsByClassName('profile-card');
            let hasVisibleProfiles = false;

            for (let i = 0; i < profileCards.length; i++) {
                const username = profileCards[i].getAttribute('data-username').toLowerCase();
                if (username.includes(filter)) {
                    profileCards[i].style.display = 'block';
                    hasVisibleProfiles = true;
                } else {
                    profileCards[i].style.display = 'none';
                }
            }

            // Show "No users found" message if no profiles match the search
            const noUsersMessage = document.getElementById('no-users-message');
            if (noUsersMessage) {
                noUsersMessage.style.display = hasVisibleProfiles ? 'none' : 'block';
            }
        }
    </script>
</body>
</html>
