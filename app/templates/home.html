<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        /* Global Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        h1 {
            color: #fff;
            margin-top: 20px;
        }

        .container {
            width: 80%;
            max-width: 1000px;
            margin-top: 40px;
        }

        /* Post Container */
        .post {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .post h2 {
            color: #4caf50;
            font-size: 1.4em;
        }

        .post p {
            font-size: 1.1em;
            color: #e0e0e0;
        }

        .like-button {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        .like-button:hover {
            background-color: #0056b3;
        }

        /* Comments Section */
        .comments {
            background-color: #333;
            border-radius: 5px;
            padding: 15px;
            margin-top: 10px;
        }

        .comment {
            background-color: #444;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .comment p {
            font-size: 1em;
            color: #fff;
        }

        .comment-author {
            font-weight: bold;
            color: #4caf50;
        }

        /* Like Count */
        .like-count {
            color: #ff9800;
            font-weight: bold;
            font-size: 1.2em;
        }

        /* Form Styles */
        .form-container {
            background-color: #222;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        input[type="text"], input[type="password"], textarea {
            background-color: #333;
            border: 1px solid #555;
            color: #fff;
            padding: 12px;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 1em;
        }

        button {
            background-color: #28a745;
            color: #fff;
            padding: 3px 8px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 0.8em;
        }

        button:hover {
            background-color: #218838;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                width: 90%;
            }

            .form-container {
                padding: 20px;
            }

            button {
                width: 100%;
            }
        }

        /* Link Styling */
        a {
            color: #ff9800;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Welcome, {{ username }}</h1>

    <div class="container">
        <!-- Loop through posts -->
        {% for post_id, post in posts.items() %}
            <div class="post" id="post-{{ post.id }}">
                <a href="{{ url_for('profile.profile', username=post.username) }}">
                    <h2>{{ post.username }} says:</h2>
                </a>
                <p>{{ post.content }}</p>
                <p class="like-count">Likes: {{ post.liked_count }}</p>

                <!-- Like/Unlike button -->
                <form method="POST" action="{{ url_for('home.home') }}">
                    <input type="hidden" name="action" value="like_post">
                    <input type="hidden" name="post_id" value="{{ post.id }}">
                    <button type="submit">
                        {% if post.id in likes %}
                            Unlike
                        {% else %}
                            Like
                        {% endif %}
                    </button>
                </form>

                <!-- Delete Post Button -->
                <form method="POST" action="{{ url_for('home.home') }}">
                    <input type="hidden" name="action" value="delete_post">
                    <input type="hidden" name="post_id" value="{{ post.id }}">
                    <button style="background-color: #e74c3c;" type="submit">Delete Post</button>
                </form>

                <!-- Comments Section -->
                <div class="comments">
                    <h3>Comments:</h3>
                    {% for comment in post.comments %}
                        <div class="comment" id="comment-{{ comment.comment_id }}">
                            <p><span class="comment-author">{{ comment.comment_author }}</span>: {{ comment.comment_content }}</p>
                            <!-- Delete Comment Button -->
                            <form method="POST" action="{{ url_for('home.home') }}">
                                <input type="hidden" name="action" value="delete_comment">
                                <input type="hidden" name="comment_id" value="{{ comment.comment_id }}">
                                <button style="background-color: #e74c3c;" type="submit">Delete Comment</button>
                            </form>
                        </div>
                    {% endfor %}
                    
                    <!-- Add New Comment Form -->
                    <form method="POST" action="{{ url_for('home.home') }}">
                        <input type="hidden" name="action" value="post_comment">
                        <input type="hidden" name="post_id" value="{{ post.id }}">
                        <textarea name="comment_content" placeholder="Add a comment..." required></textarea><br>
                        <button type="submit">Post Comment</button>
                    </form>
                </div>
            </div>
        {% endfor %}

        <!-- Form for creating a post -->
        <div class="form-container">
            <h2>Create a Post</h2>
            <form method="POST" action="{{ url_for('home.home') }}">
                <textarea name="content" placeholder="Write something..." required></textarea><br>
                <button type="submit">Post</button>
            </form>
        </div>
    </div>
</body>

</html>
